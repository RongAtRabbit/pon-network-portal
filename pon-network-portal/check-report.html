<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接健康检查报告 | PON Portal</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .status-ok { color: var(--success); }
        .status-error { color: var(--danger); }
        .status-warning { color: var(--warning); }
        .log-container {
            background: var(--gray-900);
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
            border-radius: var(--radius-lg);
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
        .check-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .summary-card {
            background: white;
            padding: 25px;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow-md);
        }
        .summary-number {
            font-size: 3rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .summary-label {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><span class="logo-icon">🌐</span><span class="logo-text">PON Portal</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="pages/vendors/huawei-f5g.html" class="nav-link">行业方案</a></li>
                <li><a href="index.html" class="nav-link">最新资讯</a></li>
                <li><a href="pages/docs/center.html" class="nav-link">技术文档</a></li>
                <li><a href="insights.html" class="nav-link">技术洞察</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding: 100px 20px 60px;">
        <h1>🔍 链接健康检查报告</h1>
        <p style="color: var(--text-secondary); margin: 15px 0;">每30分钟自动检查所有页面链接和标题</p>

        <div id="summary">
            <div class="check-summary">
                <div class="summary-card">
                    <div class="summary-number status-ok" id="totalPages">--</div>
                    <div class="summary-label">检查页面总数</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number status-ok" id="okCount">--</div>
                    <div class="summary-label">正常</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number status-error" id="errorCount">--</div>
                    <div class="summary-label">错误</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number" id="lastCheck">--</div>
                    <div class="summary-label">上次检查</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>📋 最新检查日志</h3>
                <button class="btn btn-primary btn-sm" onclick="refreshLogs()">🔄 刷新</button>
            </div>
            <div class="card-body">
                <div class="log-container" id="logContent">
                    加载中...
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <div class="card-header">
                <h3>❌ 错误记录</h3>
            </div>
            <div class="card-body">
                <div class="log-container" id="errorContent" style="color: #ff6b6b;">
                    加载中...
                </div>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <button class="btn btn-primary" onclick="runCheck()">▶️ 立即运行检查</button>
            <a href="index.html" class="btn btn-secondary">← 返回首页</a>
        </div>
    </main>

    <script>
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch('logs/link-check.log');
                const text = await response.text();
                document.getElementById('logContent').textContent = text || '暂无日志';
                
                // 解析统计
                parseStats(text);
            } catch (e) {
                document.getElementById('logContent').textContent = '无法加载日志: ' + e.message;
            }
        }

        // 加载错误日志
        async function loadErrors() {
            try {
                const response = await fetch('logs/link-errors.log');
                const text = await response.text();
                document.getElementById('errorContent').textContent = text || '暂无错误记录';
            } catch (e) {
                document.getElementById('errorContent').textContent = '暂无错误记录';
            }
        }

        // 解析统计数据
        function parseStats(logText) {
            const totalMatch = logText.match(/共 (\d+) 个页面/);
            const errorMatch = logText.match(/(\d+) 个错误/);
            const timeMatch = logText.match(/检查完成: ([\d\-:\s]+)/);

            if (totalMatch) {
                document.getElementById('totalPages').textContent = totalMatch[1];
                const errors = errorMatch ? parseInt(errorMatch[1]) : 0;
                document.getElementById('okCount').textContent = parseInt(totalMatch[1]) - errors;
                document.getElementById('errorCount').textContent = errors;
            }

            if (timeMatch) {
                document.getElementById('lastCheck').textContent = timeMatch[1].split(' ')[1].substring(0, 5);
            }
        }

        // 刷新日志
        function refreshLogs() {
            loadLogs();
            loadErrors();
        }

        // 运行检查（模拟）
        function runCheck() {
            alert('请在服务器终端手动运行:\n\n/home/ryes/.openclaw/workspace/pon-network-portal/scripts/check-links.sh');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            loadErrors();
        });
    </script>
</body>
</html>
